[plugin]
summary = 'OSS'
version = '0.0.5'
description = '阿里云 OSS 文件上传'
author = 'wu-clan'
tags = ['storage']
database = ['mysql', 'postgresql']

[app]
router = ['v1']

[settings]
OSS_BUCKET_NAME = 'fba-test'
OSS_ENDPOINT = 'https://oss-cn-hangzhou.aliyuncs.com'
OSS_USE_SIGNED_URL = true
OSS_SIGNED_URL_EXPIRE_SECONDS = 300
